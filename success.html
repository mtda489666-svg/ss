<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .success-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 480px;
            width: 90%;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .checkmark-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            position: relative;
            animation: scaleIn 0.5s ease-out 0.3s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .checkmark {
            width: 60px;
            height: 60px;
            stroke: white;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.6s ease-out 0.8s forwards;
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }

        h1 {
            color: #2d3436;
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .amount {
            font-size: 3rem;
            color: #00b894;
            font-weight: 800;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            color: #636e72;
            font-size: 0.95rem;
        }

        .detail-row strong {
            color: #2d3436;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: #636e72;
            border: 2px solid #dfe6e9;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd700;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .transaction-id {
            font-family: 'Courier New', monospace;
            background: #e9ecef;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #495057;
            display: inline-block;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .success-container {
                padding: 40px 25px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .amount {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="checkmark-circle">
            <svg class="checkmark" viewBox="0 0 52 52">
                <path d="M14 27 L22 35 L38 16"></path>
            </svg>
        </div>
        
        <h1>Payment Successful!</h1>
        <p style="color: #636e72; margin-bottom: 10px;">Thank you for your purchase</p>
        
        <div class="amount" id="amount">$99.00</div>
        
        <div class="details">
            <div class="detail-row">
                <span>Order ID</span>
                <strong id="orderId">#ORD-2024-001</strong>
            </div>
            <div class="detail-row">
                <span>Date</span>
                <strong id="date">Apr 5, 2026</strong>
            </div>
            <div class="detail-row">
                <span>Payment Method</span>
                <strong>Credit Card</strong>
            </div>
            <div class="detail-row">
                <span>Status</span>
                <strong style="color: #00b894;">Completed</strong>
            </div>
        </div>
        
        <div class="transaction-id" id="transactionId">
            TXN: 8f4a2b9c1d3e5f7a
        </div>
        
        <div style="margin-top: 30px;">
            <button class="btn-primary" onclick="goToDashboard()">
                Continue to Dashboard
            </button>
            <button class="btn-secondary" onclick="downloadReceipt()">
                Download Receipt
            </button>
        </div>
    </div>

    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // Update page with URL parameters if present
        if (urlParams.get('amount')) {
            document.getElementById('amount').textContent = '$' + urlParams.get('amount');
        }
        if (urlParams.get('orderId')) {
            document.getElementById('orderId').textContent = '#' + urlParams.get('orderId');
        }
        if (urlParams.get('transactionId')) {
            document.getElementById('transactionId').textContent = 'TXN: ' + urlParams.get('transactionId');
        }

        // Create confetti effect
        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#00b894', '#ffd700', '#ff6b6b'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        // Trigger confetti on load
        window.addEventListener('load', createConfetti);

        // Button actions
        function goToDashboard() {
            // Redirect to your main application
            window.location.href = '/dashboard';
        }

        function downloadReceipt() {
            // Simulate receipt download
            alert('Receipt downloaded successfully!');
        }

        // Auto-redirect after 10 seconds (optional)
        setTimeout(() => {
            // Uncomment to enable auto-redirect
            // window.location.href = '/dashboard';
        }, 10000);
    </script>
</body>
</html>
